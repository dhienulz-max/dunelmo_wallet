<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DompetKu - Hemat</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-gray-100 h-screen flex flex-col">

    <!-- Header -->
    <header class="bg-blue-600 text-white p-4 pt-6 shadow-md">
        <h1 class="text-xl font-bold">DompetKu</h1>
        <p class="text-xs text-blue-200">Data tersimpan di HP Anda</p>
    </header>

    <main class="flex-1 overflow-y-auto p-4 pb-24">
        <!-- Saldo -->
        <div class="bg-gradient-to-r from-blue-500 to-indigo-600 rounded-2xl p-5 text-white shadow-lg mb-6">
            <p class="text-sm">Total Saldo</p>
            <h2 class="text-3xl font-bold" id="total-balance">Rp 0</h2>
        </div>

        <!-- Daftar Transaksi -->
        <div id="transaction-list" class="space-y-3">
            <!-- Data muncul di sini -->
        </div>
    </main>

    <!-- Tombol Tambah -->
    <button onclick="toggleModal()" class="fixed bottom-6 right-6 bg-blue-600 text-white w-14 h-14 rounded-full shadow-lg text-xl z-20">+</button>

    <!-- Modal Input -->
    <div id="modal" class="fixed inset-0 bg-black bg-opacity-50 hidden flex justify-center items-end p-4">
        <div class="bg-white w-full rounded-t-3xl p-6">
            <h2 class="text-lg font-bold mb-4">Catat Transaksi</h2>
            <form id="tx-form" onsubmit="saveData(event)" class="space-y-4">
                <input type="number" id="amount" placeholder="Nominal (Rp)" required class="w-full border-b-2 p-2 outline-none">
                <input type="text" id="note" placeholder="Catatan/Kategori" required class="w-full border-b-2 p-2 outline-none">
                <select id="type" class="w-full p-2 border rounded">
                    <option value="Pemasukan">Pemasukan (+)</option>
                    <option value="Pengeluaran">Pengeluaran (-)</option>
                </select>
                <button type="submit" class="w-full bg-blue-600 text-white p-3 rounded-xl">Simpan</button>
            </form>
        </div>
    </div>

    <script>
        // 1. Ambil data dari penyimpanan HP
        let transactions = JSON.parse(localStorage.getItem('my_wallet_data')) || [];

        function updateUI() {
            let balance = 0;
            const list = document.getElementById('transaction-list');
            list.innerHTML = '';

            transactions.forEach((tx, index) => {
                balance += tx.type === 'Pemasukan' ? tx.amount : -tx.amount;
                list.innerHTML += `
                    <div class="bg-white p-4 rounded-xl flex justify-between shadow-sm">
                        <div><p class="font-bold">${tx.note}</p><p class="text-xs text-gray-500">${tx.type}</p></div>
                        <div class="font-bold ${tx.type === 'Pemasukan' ? 'text-green-500' : 'text-red-500'}">
                            ${tx.type === 'Pemasukan' ? '+' : '-'} Rp ${tx.amount.toLocaleString()}
                        </div>
                    </div>
                `;
            });
            document.getElementById('total-balance').innerText = 'Rp ' + balance.toLocaleString();
        }

        // 2. Simpan data ke HP
        function saveData(e) {
            e.preventDefault();
            const tx = {
                amount: parseInt(document.getElementById('amount').value),
                note: document.getElementById('note').value,
                type: document.getElementById('type').value
            };
            transactions.push(tx);
            localStorage.setItem('my_wallet_data', JSON.stringify(transactions));
            updateUI();
            toggleModal();
        }

        function toggleModal() { document.getElementById('modal').classList.toggle('hidden'); }
        updateUI();
    </script>
</body>
</html>
